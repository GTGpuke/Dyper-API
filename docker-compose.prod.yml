# Surcharge de production : à utiliser AVEC docker-compose.yml derrière un reverse proxy de façade
# (Caddy/nginx) qui termine le TLS et sert dyper.app. Cf. docs/HOSTING.md.
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Principe : les services n'écoutent que sur la boucle locale (127.0.0.1) ; seul le reverse proxy
# expose le domaine public. dyper-ai n'expose aucun port (interne, atteint via le réseau Docker).
services:
  dyper-web:
    # Redémarrage automatique au boot de la VM / après crash (sauf arrêt manuel explicite).
    restart: unless-stopped
    build:
      context: ./dyper-web
      args:
        # Origine unique : la SPA appelle /api/v1 en relatif (mêmes cookies, pas de CORS).
        VITE_API_URL: ""
        VITE_APP_KEY: ${APP_KEY:-}
    # !override : REMPLACE la liste de ports de la base (sinon compose fusionne et le binding
    # public 0.0.0.0:5173 de docker-compose.yml subsisterait — fuite hors du reverse proxy).
    ports: !override
      - "127.0.0.1:8080:80"

  dyper-api:
    restart: unless-stopped
    # !override idem : ne garder que la boucle locale (le 0.0.0.0:3000 de la base entrerait
    # sinon en conflit avec ce binding 127.0.0.1:3000 → l'API ne s'exposerait sur aucun port).
    ports: !override
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      # Origine servie par le reverse proxy (cookies first-party).
      CORS_ORIGIN: ${CORS_ORIGIN:-https://dyper.app}
      # Allocation de capacité : ajuster selon la VRAM du GPU (cf. docs/HOSTING.md §3).
      MAX_CONCURRENT_ANALYSES: ${MAX_CONCURRENT_ANALYSES:-2}
      # Marge sur l'appel image -> dyper-ai (défaut app 30 s) : absorbe une 1re inférence lourde.
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-60000}
      # Débit relevé : la démo temps réel envoie ~4 frames/s (défaut 60/min = 1/s sinon 429).
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-60}

  # dyper-ai : aucune section `ports` — volontairement non exposé publiquement.
  # Le GPU (L40S) et la wheel Torch CUDA sont fournis par la surcharge docker-compose.gpu.yml,
  # empilée en production (cf. .github/workflows/ci-deploy.yml). Ici, on ne fixe que le restart.
  dyper-ai:
    restart: unless-stopped
