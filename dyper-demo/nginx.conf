# Configuration nginx pour servir la SPA de démo avec fallback sur index.html.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Routes inconnues -> index.html (routing côté client).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache long des assets versionnés (hash dans le nom de fichier).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
