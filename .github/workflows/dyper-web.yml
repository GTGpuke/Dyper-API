# CI — dyper-web (React / TypeScript / Vite). Qualité : lint ESLint + build.
name: dyper-web — Qualité

on:
  push:
    paths:
      - 'dyper-web/**'
      - '.github/workflows/dyper-web.yml'
  pull_request:
    paths:
      - 'dyper-web/**'
      - '.github/workflows/dyper-web.yml'

jobs:
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dyper-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dyper-web/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build de production
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000
          VITE_APP_KEY: ci-build-key
