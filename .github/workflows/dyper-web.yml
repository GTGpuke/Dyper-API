# CI — dyper-web (React / TypeScript / Vite).
# Déclenché sur chaque push ou pull request touchant le module dyper-web.

name: dyper-web CI

on:
  push:
    paths:
      - 'dyper-web/**'
  pull_request:
    paths:
      - 'dyper-web/**'

jobs:
  build:
    name: Vérification TypeScript et build
    runs-on: ubuntu-latest

    defaults:
      run:
        # Toutes les commandes s'exécutent dans le dossier du module.
        working-directory: dyper-web

    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v4

      - name: Configurer Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dyper-web/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier le typage TypeScript
        run: npx tsc --noEmit

      - name: Construire le bundle de production
        run: npm run build
        env:
          # URL factice utilisée uniquement pour valider le build.
          VITE_API_URL: http://localhost:3000
