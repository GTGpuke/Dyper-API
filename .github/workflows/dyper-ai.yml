# CI — dyper-ai (Python / FastAPI). Qualité : ruff, mypy, pytest.
# La stack ML lourde (ultralytics/torch) n'est PAS installée : le runner YOLO est mocké en test,
# ce qui permet une CI rapide et sans modèle .pt.
name: dyper-ai — Qualité

on:
  push:
    paths:
      - 'dyper-ai/**'
      - '.github/workflows/dyper-ai.yml'
  pull_request:
    paths:
      - 'dyper-ai/**'
      - '.github/workflows/dyper-ai.yml'

jobs:
  quality:
    name: Lint, Typage & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dyper-ai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: dyper-ai/requirements-dev.txt

      - name: Installation des dépendances (légères, hors ultralytics/torch)
        run: |
          pip install -r requirements-dev.txt
          pip install "fastapi==0.111.0" "pydantic>=2.7" "pydantic-settings>=2.3" "pillow>=10.4" "opencv-python-headless>=4.9"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Vérification du format (ruff)
        run: ruff format --check app tests

      - name: Typage (mypy)
        run: mypy app

      - name: Génération des fixtures de test
        run: python tests/fixtures/generate_blank.py

      - name: Tests (unitaires + régression, runner YOLO mocké)
        run: pytest -v
        env:
          AI_INTERNAL_KEY: test-key-ci
