# Déploiement du monorepo Dyper (dyper-ai + dyper-api + dyper-web).
# Stubs prêts à activer une fois l'infrastructure disponible (calqué sur Challenges V2).
name: Déploiement

on:
  push:
    branches: [dev, main]

jobs:
  # ---------------------------------------------------------------------------
  # Étape 1 — Qualité agrégée (les workflows par service tournent aussi en parallèle).
  # ---------------------------------------------------------------------------
  quality:
    name: Récapitulatif qualité
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Note
        run: echo "Les contrôles qualité par service (dyper-api / dyper-ai / dyper-web) doivent passer avant déploiement."

  # ---------------------------------------------------------------------------
  # Étape 2a — Déploiement sur le serveur de test (branche dev).
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy (Dev)
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/dev'
    env:
      DEPLOY_HOST: ${{ secrets.DEV_SERVER_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Garde : on ne déploie que si les secrets serveur sont configurés. Sinon l'étape est
      # ignorée (la CI reste verte) — utile tant que l'infrastructure n'est pas provisionnée.
      - name: Vérifier la configuration de déploiement
        id: guard
        run: |
          if [ -n "$DEPLOY_HOST" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Déploiement dev ignoré (secrets DEV_SERVER_* absents)."
          fi

      # Déploiement par SSH + docker compose sur le serveur de test (modèle mono-instance).
      # Prérequis serveur : Docker, dépôt cloné dans /opt/dyper, .env rempli, poids dans ./model.
      - name: Déploiement via SSH (docker compose)
        if: steps.guard.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/dyper
            git fetch --all
            git checkout dev
            git pull origin dev
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker image prune -f

  # ---------------------------------------------------------------------------
  # Étape 2b — Déploiement en production (branche main).
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_HOST: ${{ secrets.PROD_SERVER_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Garde identique : déploiement seulement si les secrets de production sont présents.
      - name: Vérifier la configuration de déploiement
        id: guard
        run: |
          if [ -n "$DEPLOY_HOST" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Déploiement prod ignoré (secrets PROD_SERVER_* absents)."
          fi

      # Déploiement mono-instance par SSH + docker compose (cf. docs/HOSTING.md).
      # Le serveur reconstruit et redémarre les trois services ; dyper-ai reste interne.
      - name: Déploiement via SSH (docker compose)
        if: steps.guard.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/dyper
            git fetch --all
            git checkout main
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker image prune -f

      - name: Vérification de santé post-déploiement
        if: steps.guard.outputs.ready == 'true'
        run: echo "::notice::Déploiement terminé. Vérifiez https://dyper.app/health (cf. docs/HOSTING.md)."
