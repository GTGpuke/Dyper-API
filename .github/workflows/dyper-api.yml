# CI — dyper-api (Fastify / TypeScript). Qualité : lint, audit, tests, build.
name: dyper-api — Qualité

on:
  push:
    paths:
      - 'dyper-api/**'
      - '.github/workflows/dyper-api.yml'
  pull_request:
    paths:
      - 'dyper-api/**'
      - '.github/workflows/dyper-api.yml'

jobs:
  quality:
    name: Lint, Audit, Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dyper-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dyper-api/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Vérification du format et du lint (Biome)
        run: npx biome ci src tests

      - name: Audit des vulnérabilités
        run: npm audit --audit-level=high

      - name: Tests avec couverture
        run: npm run test:coverage
        env:
          NODE_ENV: test

      - name: Vérification du build TypeScript
        run: npm run build

      - name: Upload du rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dyper-api-coverage-${{ github.sha }}
          path: dyper-api/coverage/
          retention-days: 7
