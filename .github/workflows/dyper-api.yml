# CI — dyper-api (Node.js / Express).
# Déclenché sur chaque push ou pull request touchant le module dyper-api.

name: dyper-api CI

on:
  push:
    paths:
      - 'dyper-api/**'
  pull_request:
    paths:
      - 'dyper-api/**'

jobs:
  test:
    name: Tests Node.js
    runs-on: ubuntu-latest

    defaults:
      run:
        # Toutes les commandes s'exécutent dans le dossier du module.
        working-directory: dyper-api

    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v4

      - name: Configurer Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dyper-api/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Exécuter les tests unitaires
        run: npm run test:unit

      - name: Exécuter les tests de régression
        run: npm run test:regression
        env:
          # Fournit une clé interne factice pour les tests de régression.
          AI_INTERNAL_KEY: test-key-ci
          AI_SERVICE_URL: http://localhost:8000
